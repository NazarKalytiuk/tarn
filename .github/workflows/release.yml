name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: hive-linux-amd64
            binary: tarn
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: hive-linux-arm64
            binary: tarn
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: hive-darwin-amd64
            binary: tarn
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: hive-darwin-arm64
            binary: tarn
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: hive-windows-amd64
            binary: tarn.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross-compilation tools for aarch64-linux
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p tarn

      - name: Package unix archives
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir package
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} package/tarn
          chmod +x package/tarn
          tar czf ${{ matrix.artifact }}.tar.gz -C package tarn

      - name: Package windows archives
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/tarn.exe"
          Compress-Archive -Path package/tarn.exe -DestinationPath "${{ matrix.artifact }}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > hive-checksums.txt

      - name: Render Homebrew formula
        run: |
          TAG="${GITHUB_REF_NAME}" \
          LINUX_AMD64_SHA="$(awk '/hive-linux-amd64.tar.gz$/ {print $1}' artifacts/hive-checksums.txt)" \
          LINUX_ARM64_SHA="$(awk '/hive-linux-arm64.tar.gz$/ {print $1}' artifacts/hive-checksums.txt)" \
          DARWIN_AMD64_SHA="$(awk '/hive-darwin-amd64.tar.gz$/ {print $1}' artifacts/hive-checksums.txt)" \
          DARWIN_ARM64_SHA="$(awk '/hive-darwin-arm64.tar.gz$/ {print $1}' artifacts/hive-checksums.txt)" \
          bash scripts/release/render-homebrew-formula.sh artifacts/tarn.rb

      - name: Upload Homebrew formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarn-homebrew-formula
          path: artifacts/tarn.rb

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz \
            artifacts/*.zip \
            artifacts/tarn.rb \
            artifacts/hive-checksums.txt

      - name: Publish Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP_REPO != ''
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp artifacts/tarn.rb tap/Formula/tarn.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tarn.rb
          git commit -m "Update tarn formula for ${GITHUB_REF_NAME}" || exit 0
          git push

  publish-crates:
    name: Publish crates.io packages
    needs: build
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish tarn
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish -p tarn

      - name: Wait for crates.io index
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: sleep 30

      - name: Publish tarn-mcp
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish -p tarn-mcp

  docker:
    name: Publish Docker image
    needs: build
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute image names
        id: images
        shell: bash
        run: |
          {
            echo 'images<<EOF'
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/tarn"
            if [ -n "$DOCKERHUB_USERNAME" ]; then
              echo "${DOCKERHUB_USERNAME}/tarn"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
