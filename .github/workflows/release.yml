name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version-alignment:
    # Coordinated release gate (NAZ-288). Runs before anything else
    # burns CI minutes so a mistyped tag, a forgotten Cargo.toml bump,
    # or drift between editors/vscode/package.json and tarn/Cargo.toml
    # fails loudly in under a minute instead of after the 20-minute
    # build matrix. The sister workflow vscode-extension-release.yml
    # performs the same check from the extension side.
    name: Verify tag and version alignment
    runs-on: ubuntu-latest
    # Only run on tag pushes. Manual workflow_dispatch runs are
    # expected to target a branch for smoke testing and should not
    # trip the tag-vs-version guard.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Check tag matches package versions
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "Resolved tag=$TAG expected version=$VERSION"

          package_version() {
            sed -n '/^\[package\]/,/^\[/p' "$1" \
              | sed -n 's/^version *= *"\([^"]*\)".*/\1/p' \
              | head -n 1
          }

          CARGO_VERSION="$(package_version tarn/Cargo.toml)"
          MCP_VERSION="$(package_version tarn-mcp/Cargo.toml)"
          LSP_VERSION="$(package_version tarn-lsp/Cargo.toml)"
          if [ -z "$CARGO_VERSION" ] || [ -z "$MCP_VERSION" ] || [ -z "$LSP_VERSION" ]; then
            echo "::error::Could not parse all Cargo package versions"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$VERSION" ] || [ "$MCP_VERSION" != "$VERSION" ] || [ "$LSP_VERSION" != "$VERSION" ]; then
            echo "::error::Tag $TAG expects all Tarn crates to declare version $VERSION."
            echo "::error::Found tarn=$CARGO_VERSION tarn-mcp=$MCP_VERSION tarn-lsp=$LSP_VERSION."
            echo "::error::Bump all Tarn crates before tagging."
            exit 1
          fi

          TARN_DEP_VERSION="$(sed -n '/^\[dependencies\]/,/^\[/p' tarn-mcp/Cargo.toml \
            | sed -n 's/^tarn *= *{[^}]*version *= *"\([^"]*\)".*/\1/p' \
            | head -n 1)"
          LSP_TARN_DEP_VERSION="$(sed -n '/^\[dependencies\]/,/^\[/p' tarn-lsp/Cargo.toml \
            | sed -n 's/^tarn *= *{[^}]*version *= *"\([^"]*\)".*/\1/p' \
            | head -n 1)"
          if [ "$TARN_DEP_VERSION" != "$VERSION" ] || [ "$LSP_TARN_DEP_VERSION" != "$VERSION" ]; then
            echo "::error::tarn-mcp/tarn-lsp must depend on tarn $VERSION."
            exit 1
          fi

          PKG_VERSION="$(node -p "require('./editors/vscode/package.json').version")"
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag $TAG expects editors/vscode/package.json version $VERSION, found $PKG_VERSION."
            echo "::error::The tarn CLI and VS Code extension must ship at the same version (NAZ-288)."
            exit 1
          fi

          echo "Tag $TAG aligned with tarn=$CARGO_VERSION tarn-mcp=$MCP_VERSION tarn-lsp=$LSP_VERSION and VS Code=$PKG_VERSION."

  build:
    name: Build ${{ matrix.target }}
    needs: verify-version-alignment
    # When the verify job is skipped (manual dispatch targeting a
    # branch), we still want the build matrix to run — the guard only
    # gates real tag pushes, not dispatch-for-smoke-test runs.
    if: ${{ always() && (needs.verify-version-alignment.result == 'success' || needs.verify-version-alignment.result == 'skipped') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tarn-linux-amd64
            binary: tarn
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tarn-linux-arm64
            binary: tarn
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tarn-darwin-amd64
            binary: tarn
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tarn-darwin-arm64
            binary: tarn
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tarn-windows-amd64
            binary: tarn.exe
            archive: zip

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross-compilation tools for aarch64-linux
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p tarn -p tarn-mcp -p tarn-lsp

      - name: Package unix archives
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir package
          cp target/${{ matrix.target }}/release/tarn package/tarn
          cp target/${{ matrix.target }}/release/tarn-mcp package/tarn-mcp
          cp target/${{ matrix.target }}/release/tarn-lsp package/tarn-lsp
          chmod +x package/tarn package/tarn-mcp package/tarn-lsp
          tar czf ${{ matrix.artifact }}.tar.gz -C package tarn tarn-mcp tarn-lsp

      - name: Package windows archives
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/tarn.exe" "package/tarn.exe"
          Copy-Item "target/${{ matrix.target }}/release/tarn-mcp.exe" "package/tarn-mcp.exe"
          Copy-Item "target/${{ matrix.target }}/release/tarn-lsp.exe" "package/tarn-lsp.exe"
          Compress-Archive -Path package/tarn.exe,package/tarn-mcp.exe,package/tarn-lsp.exe -DestinationPath "${{ matrix.artifact }}.zip" -Force

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > tarn-checksums.txt

      - name: Render Homebrew formula
        run: |
          TAG="${GITHUB_REF_NAME}" \
          LINUX_AMD64_SHA="$(awk '/tarn-linux-amd64.tar.gz$/ {print $1}' artifacts/tarn-checksums.txt)" \
          LINUX_ARM64_SHA="$(awk '/tarn-linux-arm64.tar.gz$/ {print $1}' artifacts/tarn-checksums.txt)" \
          DARWIN_AMD64_SHA="$(awk '/tarn-darwin-amd64.tar.gz$/ {print $1}' artifacts/tarn-checksums.txt)" \
          DARWIN_ARM64_SHA="$(awk '/tarn-darwin-arm64.tar.gz$/ {print $1}' artifacts/tarn-checksums.txt)" \
          bash scripts/release/render-homebrew-formula.sh artifacts/tarn.rb

      - name: Upload Homebrew formula artifact
        uses: actions/upload-artifact@v7
        with:
          name: tarn-homebrew-formula
          path: artifacts/tarn.rb

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz \
            artifacts/*.zip \
            artifacts/tarn.rb \
            artifacts/tarn-checksums.txt

      - name: Publish Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP_REPO != ''
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp artifacts/tarn.rb tap/Formula/tarn.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tarn.rb
          git commit -m "Update tarn formula for ${GITHUB_REF_NAME}" || exit 0
          git push

  publish-crates:
    name: Publish crates.io packages
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        if: env.CARGO_REGISTRY_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          package_version() {
            sed -n '/^\[package\]/,/^\[/p' "$1" \
              | sed -n 's/^version *= *"\([^"]*\)".*/\1/p' \
              | head -n 1
          }

          VERSION="$(package_version tarn/Cargo.toml)"

          publish_or_skip_existing() {
            local crate="$1"
            local output
            set +e
            output="$(cargo publish -p "$crate" 2>&1)"
            local status=$?
            set -e
            printf '%s\n' "$output"
            if [ "$status" -eq 0 ]; then
              return 0
            fi
            if printf '%s\n' "$output" | grep -Eiq 'already (exists|uploaded)|crate version .* is already uploaded'; then
              echo "$crate $VERSION is already published; continuing."
              return 0
            fi
            return "$status"
          }

          wait_for_crate_version() {
            local crate="$1"
            local version="$2"
            local api="https://crates.io/api/v1/crates/${crate}"
            local latest
            for attempt in $(seq 1 36); do
              latest="$(curl -sH 'User-Agent: tarn-release-check' "$api" 2>/dev/null \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['crate']['max_version'])" 2>/dev/null \
                || true)"
              if [ "$latest" = "$version" ]; then
                echo "$crate $version is visible on crates.io (max_version)."
                return 0
              fi
              echo "$crate $version not visible yet (attempt $attempt/36, latest=${latest:-unknown}); sleeping 15s..."
              sleep 15
            done
            echo "::error::$crate $version did not appear on crates.io in time."
            return 1
          }

          publish_or_skip_existing tarn
          wait_for_crate_version tarn "$VERSION"
          publish_or_skip_existing tarn-mcp
          wait_for_crate_version tarn-mcp "$VERSION"
          publish_or_skip_existing tarn-lsp

  docker:
    name: Publish Docker image
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute image names
        id: images
        shell: bash
        run: |
          {
            echo 'images<<EOF'
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/tarn"
            if [ -n "$DOCKERHUB_USERNAME" ]; then
              echo "${DOCKERHUB_USERNAME}/tarn"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
