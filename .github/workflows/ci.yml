name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            run_smoke: true
            run_extra_checks: true
          - os: macos-latest
            label: macOS
            run_smoke: true
            run_extra_checks: false
          - os: windows-latest
            label: Windows
            run_smoke: false
            run_extra_checks: false

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Format check
        if: matrix.run_extra_checks
        run: cargo fmt --check

      - name: Clippy
        if: matrix.run_extra_checks
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-audit
        if: matrix.run_extra_checks
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        if: matrix.run_extra_checks
        run: cargo audit

      - name: Build workspace
        run: cargo build --workspace

      - name: Test demo-server
        run: cargo test -p demo-server

      - name: Test tarn libs and bins
        run: cargo test -p tarn --lib --bins

      # Diagnostic probe: integration tests on Windows have been
      # crashing with STATUS_STACK_OVERFLOW (-1073741571 / 0xC00000FD)
      # in the spawned `tarn.exe` since the suite was switched from
      # `--no-run` to a real run in v0.11.0. Hypothesis: debug-build
      # `tarn.exe` blows the 1 MB Windows main-thread stack because of
      # the giant `run_command` frame (31 args, ~2k LOC). Run a few
      # trivial CLI invocations against the same debug binary — if
      # even `--version` crashes, the hypothesis is confirmed and the
      # fix is `[profile.dev.package.tarn] opt-level = 1`. Probe is
      # non-fatal so the integration step still runs and we capture
      # both data points in one CI run.
      - name: Probe debug tarn.exe on Windows (stack-overflow check)
        if: matrix.label == 'Windows'
        shell: bash
        continue-on-error: true
        run: |
          set +e
          BIN=target/debug/tarn.exe
          echo "::group::$BIN --version"
          "$BIN" --version
          echo "exit_code=$?"
          echo "::endgroup::"
          echo "::group::$BIN run --help"
          "$BIN" run --help >/dev/null
          echo "exit_code=$?"
          echo "::endgroup::"
          echo "::group::$BIN run missing.tarn.yaml --agent --ndjson (expect 2)"
          "$BIN" run missing.tarn.yaml --agent --ndjson
          echo "exit_code=$?"
          echo "::endgroup::"

      - name: Test tarn integration suite
        run: cargo test -p tarn --test integration_test

      - name: Test tarn-mcp
        run: cargo test -p tarn-mcp

      - name: Test tarn-lsp
        run: cargo test -p tarn-lsp

      - name: Package tarn crate
        if: matrix.run_extra_checks
        run: cargo package -p tarn

      - name: Build release binaries
        run: cargo build --release -p tarn -p tarn-mcp -p tarn-lsp -p demo-server

      - name: Release-path smoke test
        if: matrix.run_smoke
        shell: bash
        run: bash scripts/ci/smoke.sh

      - name: Tarn version smoke
        if: ${{ !matrix.run_smoke }}
        run: cargo run --quiet --release -p tarn -- --version

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: conformance

      - name: Run public conformance suite
        run: cargo test -p tarn --test conformance_test
