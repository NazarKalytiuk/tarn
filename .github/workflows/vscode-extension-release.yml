name: VS Code Extension Release

on:
  # Trigger after the Rust `Release` workflow finishes on a tag push.
  # `workflow_run` fires once per upstream completion regardless of
  # GITHUB_TOKEN restrictions on the `release: published` event, so
  # the binary release is guaranteed to be on disk before we publish
  # the extension that references it.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v0.19.0). Defaults to the current ref."
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to VS Code Marketplace + Open VSX
    runs-on: ubuntu-latest
    # Two valid entry points:
    #   * manual `workflow_dispatch` (used to retry a failed publish or
    #     ship a tag whose Release workflow predates this trigger), and
    #   * the upstream `Release` workflow finishing successfully on a
    #     tag push (`v*` head_branch).
    # Branch pushes (where head_branch isn't a tag) and failed Release
    # runs are filtered out so we never publish a half-baked release.
    if: >-
      github.event_name == 'workflow_dispatch' || (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        startsWith(github.event.workflow_run.head_branch, 'v')
      )
    defaults:
      run:
        working-directory: editors/vscode
    env:
      # Secrets are passed as env so the final `publish` steps can
      # fail loudly when they're missing instead of silently skipping.
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # `workflow_run`-triggered runs are pinned to the default
          # branch unless we ask for the tag explicitly. Resolution
          # order: manual input > upstream tag > whatever ref this run
          # already points at.
          ref: ${{ github.event.inputs.tag || github.event.workflow_run.head_branch || github.ref }}

      - name: Resolve tag name and pre-release flag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "::error::Tag '$TAG' does not start with 'v'"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Anything with a '-' suffix (e.g. 0.19.0-rc.1, 0.19.0-beta)
          # is treated as a pre-release on both marketplaces.
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved tag=$TAG version=$VERSION"

      - name: Verify tag matches editors/vscode/package.json version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED="${{ steps.tag.outputs.version }}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::error::Tag ${{ steps.tag.outputs.tag }} expects package.json version $EXPECTED, found $PKG_VERSION."
            echo "::error::Bump editors/vscode/package.json before tagging."
            exit 1
          fi

      - name: Verify alignment with tarn/Cargo.toml (NAZ-288)
        # Coordinated release gate: extension package.json and
        # tarn/Cargo.toml must declare the same version. The sister
        # workflow release.yml runs the same check from the CLI side
        # before building binaries. Keeping it on both sides catches
        # drift regardless of which pipeline the user inspects first.
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          CARGO_VERSION="$(sed -n '/^\[package\]/,/^\[/p' tarn/Cargo.toml \
            | sed -n 's/^version *= *"\([^"]*\)".*/\1/p' \
            | head -n 1)"
          EXPECTED="${{ steps.tag.outputs.version }}"
          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Could not parse [package].version from tarn/Cargo.toml"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$EXPECTED" ]; then
            echo "::error::Tag ${{ steps.tag.outputs.tag }} expects tarn/Cargo.toml version $EXPECTED, found $CARGO_VERSION."
            echo "::error::Bump tarn/Cargo.toml and editors/vscode/package.json together (NAZ-288 coordinated release)."
            exit 1
          fi
          echo "Tag ${{ steps.tag.outputs.tag }} aligned with tarn/Cargo.toml=$CARGO_VERSION and editors/vscode/package.json=$EXPECTED."

      - name: Verify Tarn binary release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # `workflow_run`-triggered runs already gate on the upstream
          # Release succeeding, so the GitHub release for this tag must
          # exist by now. For `workflow_dispatch` invocations this is a
          # sanity check rather than a wait — if the binary release is
          # missing, we fail loudly so the user cuts the Rust release
          # first instead of publishing an extension that points at a
          # non-existent download.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Binary release $TAG found."
            exit 0
          fi
          echo "::error::Binary release $TAG not found. Cut the Rust release (push a tag) first, or rerun this workflow once release.yml finishes."
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies
        run: npm audit --omit=dev

      - name: TypeScript typecheck
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build tarn binaries for integration tests
        working-directory: ${{ github.workspace }}
        run: cargo build -p tarn -p tarn-lsp -p demo-server

      - name: Integration tests
        run: xvfb-run -a npm run test:integration

      - name: Build bundle
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --no-dependencies --out tarn-vscode.vsix

      - name: Check publishing tokens
        shell: bash
        run: |
          missing=0
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret is not set. Configure it under repo Settings → Secrets → Actions."
            missing=1
          fi
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OVSX_PAT secret is not set. Configure it under repo Settings → Secrets → Actions."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        shell: bash
        run: |
          FLAGS=""
          if [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
            FLAGS="--pre-release"
          fi
          npx @vscode/vsce publish \
            --packagePath tarn-vscode.vsix \
            --pat "$VSCE_PAT" \
            $FLAGS

      - name: Publish to Open VSX
        shell: bash
        run: |
          FLAGS=""
          if [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
            FLAGS="--pre-release"
          fi
          npx ovsx publish tarn-vscode.vsix \
            --pat "$OVSX_PAT" \
            $FLAGS

      - name: Upload VSIX artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tarn-vscode-${{ steps.tag.outputs.version }}
          path: editors/vscode/tarn-vscode.vsix
          if-no-files-found: error
