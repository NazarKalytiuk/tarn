name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - "editors/vscode/**"
      - "tarn/Cargo.toml"
      - ".github/workflows/vscode-extension.yml"
  pull_request:
    paths:
      - "editors/vscode/**"
      - "tarn/Cargo.toml"
      - ".github/workflows/vscode-extension.yml"

jobs:
  check:
    name: typecheck / test / build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: editors/vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies
        run: npm audit --omit=dev

      - name: TypeScript typecheck
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Set up Rust toolchain
        if: matrix.os == 'ubuntu-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Build tarn binaries for integration tests
        if: matrix.os == 'ubuntu-latest'
        working-directory: ${{ github.workspace }}
        run: cargo build -p tarn -p tarn-lsp -p demo-server

      - name: Integration tests
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a npm run test:integration

      - name: Build bundle
        run: npm run build

      - name: Package VSIX
        if: matrix.os == 'ubuntu-latest'
        run: npx vsce package --no-dependencies --out tarn-vscode.vsix

      - name: Upload VSIX artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tarn-vscode-vsix
          path: editors/vscode/tarn-vscode.vsix
          if-no-files-found: error
