# yaml-language-server: $schema=https://raw.githubusercontent.com/NazarKalytiuk/hive/main/schemas/v1/testfile.json
name: Authenticated user flow
description: Login once in setup, reuse the bearer token across steps.
tags: [auth, smoke]

setup:
  - name: Login
    request:
      method: POST
      url: "{{ env.base_url }}/auth/login"
      body:
        email: "{{ env.admin_email }}"
        password: "{{ env.admin_password }}"
    capture:
      access_token: "$.token"

steps:
  - name: Create an authenticated user
    request:
      method: POST
      url: "{{ env.base_url }}/users"
      headers:
        Authorization: "Bearer {{ capture.access_token }}"
      body:
        name: "Template User"
        email: "template.{{ $random_hex(4) }}@example.com"
    capture:
      user_id: "$.id"
    assert:
      status: 201
      body:
        "$.id": { type: string, not_empty: true }

  - name: Read the created user back
    request:
      method: GET
      url: "{{ env.base_url }}/users/{{ capture.user_id }}"
      headers:
        Authorization: "Bearer {{ capture.access_token }}"
    assert:
      status: 200
