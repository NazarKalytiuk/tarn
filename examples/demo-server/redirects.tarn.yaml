# yaml-language-server: $schema=https://raw.githubusercontent.com/NazarKalytiuk/tarn/main/schemas/v1/testfile.json
name: Demo server redirects
steps:
  - name: Follow a single redirect
    request:
      method: GET
      url: "{{ env.base_url }}/redirect-health"
    capture:
      final_url:
        url: true
      final_status:
        status: true
    assert:
      status: 200
      redirect:
        url: "{{ env.base_url }}/health"
        count: 1
      body:
        "$.status": "ok"

  - name: Follow a redirect chain
    request:
      method: GET
      url: "{{ env.base_url }}/redirect-chain?hops=2"
    assert:
      status: 200
      redirect:
        count: 3
