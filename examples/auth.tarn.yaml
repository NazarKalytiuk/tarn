name: "Authentication Flow"
description: "Tests login and authorization"
tags: [auth]

env:
  base_url: "http://localhost:3000"

defaults:
  headers:
    Content-Type: "application/json"

steps:
  - name: Login with valid credentials
    request:
      method: POST
      url: "{{ env.base_url }}/auth/login"
      body:
        email: "admin@example.com"
        password: "password123"
    capture:
      token: "$.token"
    assert:
      status: 200
      body:
        "$.token": { type: string, not_empty: true }

  - name: Access protected endpoint with token
    request:
      method: GET
      url: "{{ env.base_url }}/users"
      headers:
        Authorization: "Bearer {{ capture.token }}"
    assert:
      status: 200

  - name: Access protected endpoint without token
    request:
      method: GET
      url: "{{ env.base_url }}/users"
    assert:
      status: 401
      body:
        "$.error": "unauthorized"

  - name: Login with missing email
    request:
      method: POST
      url: "{{ env.base_url }}/auth/login"
      body:
        password: "password123"
    assert:
      status: 422
