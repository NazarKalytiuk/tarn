name: "Assertion Showcase"
description: "Demonstrates all assertion types"
tags: [demo]

env:
  base_url: "http://localhost:3000"

defaults:
  headers:
    Content-Type: "application/json"

steps:
  - name: Login for token
    request:
      method: POST
      url: "{{ env.base_url }}/auth/login"
      body:
        email: "admin@example.com"
        password: "password123"
    capture:
      token: "$.token"
    assert:
      status: 200

  - name: Create test user for assertions
    request:
      method: POST
      url: "{{ env.base_url }}/users"
      headers:
        Authorization: "Bearer {{ capture.token }}"
      body:
        name: "Assertion Test User"
        email: "assert.{{ $random_hex(6) }}@example.com"
        role: "editor"
        tags: ["alpha", "beta", "gamma"]
    capture:
      user_id: "$.id"
    assert:
      # Status assertion
      status: 201

      # Duration assertion
      duration: "< 2s"

      # Header assertions
      headers:
        x-request-id: matches "^[a-f0-9-]{36}$"

      # Body assertions showcasing all operators
      body:
        # Simple equality
        "$.name": "Assertion Test User"
        "$.role": "editor"

        # Type checks
        "$.id": { type: string }
        "$.name": { type: string }
        "$.tags": { type: array }

        # String assertions
        "$.email": { contains: "@example.com" }
        "$.id": { starts_with: "usr_" }
        "$.id": { not_empty: true }
        "$.id": { matches: "^usr_[a-f0-9]+$" }

        # Array assertions
        "$.tags": { length: 3 }
        "$.tags": { length_gte: 1 }
        "$.tags": { length_lte: 10 }
        "$.tags": { contains: "alpha" }
        "$.tags": { not_contains: "delta" }

        # Existence
        "$.createdAt": { exists: true }
        "$.deletedAt": { exists: true }  # exists but null
