[package]
name = "tarn-mcp"
version = "0.4.1"
edition = "2021"
description = "MCP server for Tarn API testing tool"
license = "MIT"
repository = "https://github.com/NazarKalytiuk/hive"
homepage = "https://github.com/NazarKalytiuk/hive"
documentation = "https://nazarkalytiuk.github.io/tarn/mcp.html"
readme = "../README.md"
keywords = ["mcp", "api", "testing", "cli"]
categories = ["command-line-utilities", "development-tools::testing"]

[[bin]]
name = "tarn-mcp"
path = "src/main.rs"

[dependencies]
tarn = { version = "0.4.1", path = "../tarn" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
